name: Retrain Model

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install Dependencies
        run: |
          pip install mlflow
          pip install pandas
          pip install scikit-learn
          pip install joblib

      - name: Verify MLflow
        run: |
          mlflow --version

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . -e main

      - name: Save Artifact
        run: |
          echo "Training selesai" > artifact.txt

      - name: Commit Artifact
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Auto retraining artifact update" || echo "No changes"
          git push origin master